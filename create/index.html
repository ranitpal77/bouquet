<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flower Bouquet Creator 🌸</title>
    <link type="image/png" sizes="96x96" rel="icon" href="../favicon.png">
    <meta property="og:title" content="Flower Bouquet Creator 🌸">
    <meta property="og:description" content="Craft a custom digital flower bouquet message to share with your loved ones.">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="Flower Bouquet Creator 🌸">
    <meta name="twitter:description" content="Craft a custom digital flower bouquet message to share with your loved ones.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100vw;
            min-height: 100vh;
            min-height: 100dvh;
            overflow-y: auto;
            overflow-x: hidden;
            background: 
                radial-gradient(circle at 30% 30%, rgba(24, 10, 36, 0.85) 0%, rgba(0, 0, 0, 0) 65%),
                radial-gradient(circle at 70% 40%, rgba(46, 12, 28, 0.85) 0%, rgba(0, 0, 0, 0) 65%),
                radial-gradient(circle at 50% 80%, rgba(15, 30, 15, 0.45) 0%, rgba(0, 0, 0, 0) 55%),
                #040102;
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            color: #ffffff;
            padding: 40px 10px;
            gap: 30px;
        }

        body::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.03'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 1;
        }

        .container {
            width: 90%;
            max-width: 480px;
            padding: 40px 30px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 0; /* Sharp square */
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.55);
            z-index: 2;
            text-align: center;
            animation: containerFadeIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes containerFadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            font-size: 22px;
            font-weight: 400;
            letter-spacing: 1px;
            margin-bottom: 25px;
            color: rgba(255, 255, 255, 0.95);
            text-transform: uppercase;
        }

        .form-group {
            text-align: left;
            margin-bottom: 22px;
        }

        label {
            display: block;
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 1.5px;
            color: rgba(255, 255, 255, 0.45);
            margin-bottom: 8px;
            padding-left: 1px;
        }

        input[type="text"] {
            width: 100%;
            padding: 12px 14px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 0; /* Sharp square */
            color: #ffffff;
            font-family: inherit;
            font-size: 14px;
            outline: none;
            transition: all 0.25s ease;
        }

        input[type="text"]::placeholder {
            color: rgba(255, 255, 255, 0.2);
        }

        input[type="text"]:focus {
            border-color: rgba(255, 255, 255, 0.35);
            background: rgba(255, 255, 255, 0.06);
        }

        .preset-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 20px;
        }

        .preset-tag {
            padding: 6px 12px;
            font-size: 11px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 0; /* Sharp square */
            color: rgba(255, 255, 255, 0.6);
            cursor: pointer;
            user-select: none;
            transition: all 0.2s ease;
        }

        .preset-tag:hover {
            background: rgba(255, 255, 255, 0.08);
            color: #ffffff;
            border-color: rgba(255, 255, 255, 0.2);
        }

        .preset-tag.active {
            background: rgba(255, 255, 255, 0.14);
            color: #ffffff;
            border-color: rgba(255, 255, 255, 0.35);
        }

        .font-selector {
            display: flex;
            gap: 12px;
        }

        .font-option {
            flex: 1;
            padding: 12px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 0; /* Sharp square */
            cursor: pointer;
            text-align: center;
            font-size: 12px;
            letter-spacing: 0.5px;
            user-select: none;
            transition: all 0.2s ease;
            color: rgba(255, 255, 255, 0.45);
        }

        .font-option.active {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.3);
            color: #ffffff;
        }

        .font-option[data-font="mono"] {
            font-family: 'JetBrains Mono', monospace;
        }

        .font-option[data-font="inter"] {
            font-family: 'Inter', sans-serif;
        }

        .link-container {
            margin-top: 25px;
            padding: 12px 14px;
            background: rgba(0, 0, 0, 0.25);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 0; /* Sharp square */
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            color: rgba(255, 255, 255, 0.45);
            word-break: break-all;
            text-align: left;
            min-height: 42px;
            display: flex;
            align-items: center;
        }

        .button-group {
            margin-top: 24px;
            display: flex;
            gap: 12px;
        }

        button, .btn-link {
            flex: 1;
            padding: 14px;
            font-family: 'Inter', sans-serif;
            font-size: 12px;
            font-weight: 500;
            letter-spacing: 1px;
            border-radius: 0; /* Sharp square */
            cursor: pointer;
            outline: none;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            text-transform: uppercase;
        }

        .btn-copy {
            background: #ffffff;
            color: #040102;
            border: 1px solid #ffffff;
        }

        .btn-copy:hover {
            background: rgba(255, 255, 255, 0.9);
            box-shadow: 0 4px 15px rgba(255, 255, 255, 0.1);
        }

        .btn-copy:active {
            transform: scale(0.99);
        }

        .btn-preview {
            background: rgba(255, 255, 255, 0.03);
            color: #ffffff;
            border: 1px solid rgba(255, 255, 255, 0.15);
        }

        .btn-preview:hover {
            background: rgba(255, 255, 255, 0.07);
            border-color: rgba(255, 255, 255, 0.35);
        }

        .toast {
            position: absolute;
            bottom: 30px;
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.98);
            color: #000000;
            border-radius: 0; /* Sharp square */
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 0.5px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.4);
            pointer-events: none;
            opacity: 0;
            transform: translateY(8px);
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            z-index: 99;
            text-transform: uppercase;
        }

        .toast.show {
            opacity: 1;
            transform: translateY(0);
        }

        .footer-credit {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.22);
            letter-spacing: 1px;
            z-index: 3;
            text-align: center;
        }

        .footer-credit a {
            color: inherit;
            text-decoration: none;
            transition: color 0.2s;
            font-weight: 500;
        }

        .footer-credit a:hover {
            color: rgba(255, 255, 255, 0.55);
        }

        @media (max-width: 480px) {
            body {
                padding: 30px 15px;
                gap: 25px;
            }

            .container {
                width: 100%;
                padding: 25px 20px;
                box-shadow: 0 15px 40px rgba(0, 0, 0, 0.45);
            }

            h1 {
                font-size: 19px;
                margin-bottom: 20px;
            }

            .form-group {
                margin-bottom: 18px;
            }

            .preset-grid {
                gap: 6px;
            }

            .preset-tag {
                padding: 5px 10px;
                font-size: 10.5px;
            }

            .button-group {
                flex-direction: column;
                gap: 10px;
            }

            button, .btn-link {
                width: 100%;
                padding: 13px;
            }
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>Bouquet Creator</h1>

        <div class="form-group">
            <label for="message">Your Message</label>
            <input type="text" id="message" placeholder="Type a custom greeting message..." autocomplete="off">
        </div>

        <div class="form-group">
            <label>Or select a preset</label>
            <div class="preset-grid" id="presets">
                <span class="preset-tag" data-preset="birthday">Birthday 🎂</span>
                <span class="preset-tag" data-preset="love">Love ❤️</span>
                <span class="preset-tag" data-preset="exam">Exam 📝</span>
                <span class="preset-tag" data-preset="sorry">Sorry 🥺</span>
                <span class="preset-tag" data-preset="getwell">Get Well 🍵</span>
                <span class="preset-tag" data-preset="thankyou">Thanks ✨</span>
                <span class="preset-tag" data-preset="cheer">Cheer 🌸</span>
            </div>
        </div>

        <div class="form-group">
            <label>Font style</label>
            <div class="font-selector">
                <div class="font-option active" data-font="inter">Elegant (Inter)</div>
                <div class="font-option" data-font="mono">Sleek (Monospace)</div>
            </div>
        </div>

        <div class="form-group">
            <label>Your shareable link</label>
            <div class="link-container" id="link-preview"></div>
        </div>

        <div class="button-group">
            <button class="btn-copy" id="btn-copy">Copy Link</button>
            <a href="#" class="btn-link btn-preview" id="btn-preview" target="_blank">Preview 🌸</a>
        </div>
    </div>

    <div class="toast" id="toast">Link copied! 🌸</div>

    <div class="footer-credit">
        made by <a href="https://ratnadwip.com/" target="_blank">RealRatnadwip</a>
    </div>

    <script>
        const messageInput = document.getElementById('message');
        const presetsContainer = document.getElementById('presets');
        const fontSelector = document.querySelector('.font-selector');
        const linkPreview = document.getElementById('link-preview');
        const btnCopy = document.getElementById('btn-copy');
        const btnPreview = document.getElementById('btn-preview');
        const toast = document.getElementById('toast');

        let selectedPreset = null;
        let selectedFont = 'inter';

        function getBaseUrl() {
            const loc = window.location;
            const pathname = loc.pathname.replace(/\/create\/(index\.html)?$/, '/');
            return loc.protocol + '//' + loc.host + pathname;
        }

        function updateLink() {
            const baseUrl = getBaseUrl();
            let url = baseUrl;
            const textValue = messageInput.value.trim();

            if (selectedPreset) {
                url += `?${selectedPreset}`;
            } else if (textValue) {
                url += `?text=${encodeURIComponent(textValue)}`;
            }

            if (selectedPreset || textValue) {
                if (selectedFont === 'mono') {
                    url += `&font=mono`;
                }
            }

            linkPreview.textContent = url;
            btnPreview.href = url;
        }

        messageInput.addEventListener('input', () => {
            if (messageInput.value.trim() !== '') {
                selectedPreset = null;
                document.querySelectorAll('.preset-tag').forEach(tag => tag.classList.remove('active'));
            }
            updateLink();
        });

        presetsContainer.addEventListener('click', (e) => {
            const tag = e.target.closest('.preset-tag');
            if (!tag) return;

            const presetKey = tag.dataset.preset;

            if (tag.classList.contains('active')) {
                tag.classList.remove('active');
                selectedPreset = null;
            } else {
                document.querySelectorAll('.preset-tag').forEach(t => t.classList.remove('active'));
                tag.classList.add('active');
                selectedPreset = presetKey;
                messageInput.value = '';
            }
            updateLink();
        });

        fontSelector.addEventListener('click', (e) => {
            const option = e.target.closest('.font-option');
            if (!option) return;

            document.querySelectorAll('.font-option').forEach(opt => opt.classList.remove('active'));
            option.classList.add('active');
            selectedFont = option.dataset.font;
            updateLink();
        });

        btnCopy.addEventListener('click', () => {
            const textToCopy = linkPreview.textContent;
            if (!textToCopy) return;

            navigator.clipboard.writeText(textToCopy).then(() => {
                toast.classList.add('show');
                setTimeout(() => {
                    toast.classList.remove('show');
                }, 2000);
            }).catch(err => {
                console.error('Failed to copy: ', err);
            });
        });

        updateLink();
    </script>
</body>

</html>
