<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flower Bouquet Creator 🌸</title>
    <link type="image/png" sizes="96x96" rel="icon" href="../favicon.png">
    <meta property="og:title" content="Flower Bouquet Creator 🌸">
    <meta property="og:description"
        content="Craft a custom digital flower bouquet message to share with your loved ones.">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="Flower Bouquet Creator 🌸">
    <meta name="twitter:description"
        content="Craft a custom digital flower bouquet message to share with your loved ones.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@300;400;500&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <canvas id="bg"></canvas>

    <div class="container">
        <h1>Bouquet Creator</h1>

        <div class="form-group">
            <label for="message">Your Message</label>
            <input type="text" id="message" placeholder="Type a custom greeting message..." autocomplete="off">
        </div>

        <div class="form-group">
            <label>Or select a preset</label>
            <div class="preset-grid" id="presets">
                <span class="preset-tag" data-preset="birthday">Birthday 🎂</span>
                <span class="preset-tag" data-preset="love">Love ❤️</span>
                <span class="preset-tag" data-preset="exam">Exam 📝</span>
                <span class="preset-tag" data-preset="sorry">Sorry 🥺</span>
                <span class="preset-tag" data-preset="getwell">Get Well 🍵</span>
                <span class="preset-tag" data-preset="thankyou">Thanks ✨</span>
                <span class="preset-tag" data-preset="cheer">Cheer 🌸</span>
            </div>
        </div>

        <div class="form-group">
            <label>Font style</label>
            <div class="font-selector">
                <div class="font-option active" data-font="inter">Elegant (Inter)</div>
                <div class="font-option" data-font="mono">Sleek (Monospace)</div>
            </div>
        </div>

        <div class="form-group">
            <label>Flower options</label>
            <div class="garden-grid">
                <input type="number" id="flower-count" min="1" max="100" placeholder="Auto count (Max 100)"
                    autocomplete="off">
                <select id="flower-type">
                    <option value="">Random mix</option>
                    <option value="lily">Lily</option>
                    <option value="rose">Rose</option>
                    <option value="sunflower">Sunflower</option>
                    <option value="tulip">Tulip</option>
                    <option value="generic">Generic</option>
                </select>
            </div>
        </div>

        <div class="form-group">
            <label for="background-select">Background</label>
            <select id="background-select">
                <option value="">Dynamic</option>
                <option value="day">Day</option>
                <option value="night">Night</option>
                <option value="minimal">Minimal</option>
            </select>
        </div>

        <div class="form-group">
            <label>Growth timer</label>
            <div class="garden-grid">
                <input type="number" id="grow-value" min="1" max="3600" placeholder="Auto timing" autocomplete="off">
                <select id="grow-unit">
                    <option value="sec">Seconds (sec)</option>
                    <option value="min">Minutes (min)</option>
                    <option value="hr">Hours (hr)</option>
                </select>
            </div>
        </div>

        <div class="form-group">
            <label>Your shareable link</label>
            <input type="text" class="link-container" id="link-preview" readonly>
        </div>

        <div class="button-group">
            <button class="btn-copy" id="btn-copy">Copy Link</button>
            <a href="#" class="btn-link btn-preview" id="btn-preview" target="_blank">Preview 🌸</a>
        </div>
    </div>

    <div class="toast" id="toast">Link copied! 🌸</div>

    <script src="../background.js"></script>
    <script src="script.js"></script>
</body>

</html>
